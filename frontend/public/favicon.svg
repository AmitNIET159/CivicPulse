<defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#10323c" />
        <stop offset="100%" stop-color="#040e11" />
    </radialGradient>
    
    <linearGradient id="bldgFill" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#4ff0f0" stop-opacity="0.15" />
        <stop offset="100%" stop-color="#4ff0f0" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a8fafa" />
        <stop offset="40%" stop-color="#4ff0f0" />
        <stop offset="100%" stop-color="#148282" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur1" />
        <feGaussianBlur stdDeviation="12" result="blur2" />
        <feMerge>
            <feMergeNode in="blur2" />
            <feMergeNode in="blur1" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
</defs>

